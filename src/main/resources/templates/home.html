<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="min-h-screen bg-slate-100 text-slate-900">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6">
    <section class="rounded-lg border border-slate-200 bg-white p-6 text-center shadow-sm">
        <h1 class="text-3xl font-bold text-slate-950">Welcome Home</h1>
        <p class="mt-2 text-slate-500">Aplikasi Product CRUD</p>
        <div class="mt-6 flex flex-col justify-center gap-2 sm:flex-row">
            <a th:href="@{/products}" class="rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">
                Lihat Produk
            </a>
            <a th:href="@{/categories}" class="rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Kelola Kategori
            </a>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>

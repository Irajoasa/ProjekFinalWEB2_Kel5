<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="min-h-screen bg-slate-100">

<main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-950">Login</h1>
            <p class="mt-2 text-sm text-slate-500">Masuk untuk mengelola produk dan kategori.</p>
        </div>

        <div th:if="${param.logout}" class="mb-4 rounded-lg bg-blue-50 px-4 py-3 text-sm text-blue-700">
            Berhasil logout.
        </div>

        <div th:if="${param.error}" class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">
            Username atau password salah.
        </div>

        <div th:if="${success}"
             class="mb-4 rounded-lg bg-green-50 px-4 py-3 text-sm text-green-700"
             th:text="${success}">
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            <div>
                <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
                <input id="username"
                       type="text"
                       name="username"
                       required
                       autofocus
                       placeholder="Masukkan username"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <div>
                <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
                <input id="password"
                       type="password"
                       name="password"
                       required
                       placeholder="Masukkan password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <button type="submit"
                    class="w-full rounded-lg bg-slate-900 px-4 py-2.5 font-semibold text-white hover:bg-slate-700">
                Login
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
            Belum punya akun?
            <a th:href="@{/register}" class="font-semibold text-slate-900 hover:underline">Daftar di sini</a>
        </p>
    </section>
</main>

</body>
</html>

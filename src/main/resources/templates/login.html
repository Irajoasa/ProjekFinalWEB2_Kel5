<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white shadow-xl rounded-xl p-8">
        <h2 class="text-2xl font-bold text-center mb-6">
            Login
        </h2>
            <div th:if="${param.logout}"
                class="bg-blue-100 text-blue-700 p-3 rounded mb-4">
                Berhasil Logout.
            </div>

        <div th:if="${success}"
             class="bg-green-100 text-green-700 p-3 rounded mb-4"
            th:text="${success}">
        </div>
        <form th:action="@{/login}" method="post" class="space-y-4">
            <div>
                <label class="block mb-1 font-medium">
                    Username
                </label>
                <input type ="text"
                       name="username"
                       required autofocus
                       placeholder="Masukkan username"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2-blue-500 outline-none">

            </div>
            <div>
                <label class="block mb-1 font-medium">
                    Password
                </label>
                <input type ="password"
                       name="password"
                       required autofocus
                       placeholder="Masukkan username"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2-blue-500 outline-none">

            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transtion">
                Login
            </button>
        </form>
        <p class="text-center text-sm mt-5">
            Belum punya akun?
            <a th:href="@{/register}"
               class="text-blue-600 hover:underline">
                Daftar dissini
            </a>
        </p>
    </div>
</body>
</html>

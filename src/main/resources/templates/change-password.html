<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
</head>
<body>

<h2>Change Password</h2>

<div th:if="${error}" th:text="${error}" style="color:red"></div>
<div th:if="${success}" th:text="${success}" style="color:green"></div>

<form th:action="@{/change-password}" method="post">
    <input type="password" name="oldPassword" placeholder="Password Lama" required><br>
    <input type="password" name="newPassword" placeholder="Password Baru" required><br>
    <input type="password" name="confirmPassword" placeholder="Konfirmasi Password Baru" required><br>

    <button type="submit">Update Password</button>
</form>

</body>
</html>

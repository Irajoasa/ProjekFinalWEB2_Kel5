<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-xl mx-auto px-4 pb-10">
    <section class="bg-white shadow rounded-xl p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Ganti Password</h1>
                <p class="text-gray-500">Perbarui password akun kamu.</p>
            </div>
            <a th:href="@{/profile}"
               class="border px-4 py-2 rounded-lg hover:bg-gray-50">
                Batal
            </a>
        </div>

        <div th:if="${errorMessage}"
             class="bg-red-100 text-red-700 p-3 rounded mb-4"
             th:text="${errorMessage}">
        </div>

        <form th:action="@{/change-password}" method="post" class="space-y-4">
            <div>
                <label for="oldPassword" class="block mb-1 font-medium">Password Lama</label>
                <input id="oldPassword"
                       type="password"
                       name="oldPassword"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                       required>
            </div>

            <div>
                <label for="newPassword" class="block mb-1 font-medium">Password Baru</label>
                <input id="newPassword"
                       type="password"
                       name="newPassword"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                       required>
            </div>

            <div>
                <label for="confirmPassword" class="block mb-1 font-medium">Konfirmasi Password Baru</label>
                <input id="confirmPassword"
                       type="password"
                       name="confirmPassword"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                       required>
            </div>

            <button type="submit"
                    class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">
                Simpan Password
            </button>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>

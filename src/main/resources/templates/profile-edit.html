<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-4xl mx-auto px-4 pb-10">
    <section class="bg-white shadow rounded-xl p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Edit Profil</h1>
                <p class="text-gray-500" th:text="${'@' + user.username}">@username</p>
            </div>
            <a th:href="@{/profile}"
               class="border px-4 py-2 rounded-lg hover:bg-gray-50">
                Batal
            </a>
        </div>

        <form th:action="@{/profile/edit}" th:object="${user}" method="post" class="space-y-4">
            <div>
                <label class="block mb-1 font-medium">Nama Lengkap</label>
                <input type="text"
                       th:field="*{fullName}"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 font-medium">Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block mb-1 font-medium">Nomor HP</label>
                    <input type="text"
                           th:field="*{phoneNumber}"
                           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block mb-1 font-medium">URL Foto Profil</label>
                <input type="url"
                       th:field="*{profileImageUrl}"
                       placeholder="https://example.com/foto.jpg"
                       class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block mb-1 font-medium">Alamat</label>
                <textarea th:field="*{address}"
                          rows="3"
                          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <div>
                <label class="block mb-1 font-medium">Bio</label>
                <textarea th:field="*{bio}"
                          rows="4"
                          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <button type="submit"
                    class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">
                Simpan
            </button>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>

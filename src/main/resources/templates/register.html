<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="min-h-screen bg-slate-100">

<main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-950">Register Akun</h1>
            <p class="mt-2 text-sm text-slate-500">Buat akun baru untuk mulai mengelola inventory.</p>
        </div>

        <div th:if="${error}"
             class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700"
             th:text="${error}">
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">
            <div>
                <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
                <input id="username"
                       type="text"
                       th:field="*{username}"
                       required
                       autofocus
                       placeholder="Masukkan username"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <div>
                <label for="fullName" class="mb-1 block text-sm font-medium text-slate-700">Nama Lengkap</label>
                <input id="fullName"
                       type="text"
                       th:field="*{fullName}"
                       placeholder="Masukkan nama lengkap"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <div>
                <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email <span class="text-slate-400">(opsional)</span></label>
                <input id="email"
                       type="email"
                       th:field="*{email}"
                       placeholder="nama@email.com"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <div>
                <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
                <input id="password"
                       type="password"
                       th:field="*{password}"
                       required
                       placeholder="Masukkan password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <div>
                <label for="confirmPassword" class="mb-1 block text-sm font-medium text-slate-700">Konfirmasi Password</label>
                <input id="confirmPassword"
                       type="password"
                       th:field="*{confirmPassword}"
                       required
                       placeholder="Ulangi password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
            </div>

            <button type="submit"
                    class="w-full rounded-lg bg-slate-900 px-4 py-2.5 font-semibold text-white hover:bg-slate-700">
                Daftar
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
            Sudah punya akun?
            <a th:href="@{/login}" class="font-semibold text-slate-900 hover:underline">Login di sini</a>
        </p>
    </section>
</main>

</body>
</html>

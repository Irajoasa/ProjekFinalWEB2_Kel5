<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}"></head>

<body class="bg-slate-50 text-slate-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden text-left">
        <div class="bg-slate-800 p-8 text-white">
            <p class="text-indigo-400 font-bold text-sm uppercase tracking-widest mb-2"
               th:text="${product.category?.displayName}">KATEGORI</p>
            <h1 class="text-4xl font-black" th:text="${product.name}">Nama Produk</h1>
        </div>

        <div class="p-8 grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div>
                    <h3 class="text-slate-400 text-xs font-bold uppercase tracking-wider">Harga Satuan</h3>
                    <p class="text-3xl font-black text-indigo-600"
                       th:text="${'Rp ' + #numbers.formatDecimal(product.price ?: 0, 0, 'POINT', 0, 'COMMA')}">Rp 0</p>
                </div>
                <div>
                    <h3 class="text-slate-400 text-xs font-bold uppercase tracking-wider">Status Stok</h3>
                    <p class="text-xl font-bold" th:text="${(product.stock ?: 0) + ' Unit Tersedia'}">0 Unit</p>
                </div>
            </div>
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-3">Deskripsi Produk</h3>
                <p class="text-slate-600 leading-relaxed italic"
                   th:text="${product.description ?: 'Tidak ada deskripsi.'}">Deskripsi...</p>
            </div>
        </div>

        <div class="px-8 py-6 bg-slate-50 border-t border-slate-100 flex gap-4">
            <a th:href="@{/products/{id}/edit(id=${product.id})}"
               class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition">Edit Produk</a>
            <a th:href="@{/products}"
               class="bg-white text-slate-700 border border-slate-300 px-6 py-2 rounded-xl font-bold hover:bg-slate-50 transition text-decoration-none">Kembali</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:block th:replace="~{fragments/layout :: header}"></head>
<body class="min-h-screen bg-slate-100 text-slate-900">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="mx-auto max-w-3xl px-4 py-8 sm:px-6 lg:py-10">
    <section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
        <div class="mb-6 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-950"
                    th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
                    Form Produk
                </h1>
                <p class="mt-1 text-sm text-slate-500">Lengkapi data produk dengan kategori milik akun kamu.</p>
            </div>
            <a th:href="@{/products}" class="rounded-lg border border-slate-300 px-4 py-2 text-center text-sm font-semibold text-slate-700 hover:bg-slate-50">
                Kembali
            </a>
        </div>

        <form th:action="@{/products/save}" th:object="${product}" method="post" class="space-y-5">
            <input type="hidden" th:field="*{id}">

            <div>
                <label for="name" class="mb-1 block text-sm font-medium text-slate-700">Nama Produk</label>
                <input id="name"
                       type="text"
                       th:field="*{name}"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
                       required>
            </div>

            <div>
                <label for="categoryId" class="mb-1 block text-sm font-medium text-slate-700">Kategori</label>
                <select id="categoryId"
                        name="categoryId"
                        class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                    <option value="">-- Pilih Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:selected="${product.category != null and product.category.id == cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>

            <div class="grid gap-5 sm:grid-cols-2">
                <div>
                    <label for="priceDisplay" class="mb-1 block text-sm font-medium text-slate-700">Harga</label>
                    <input type="hidden" id="price" th:field="*{price}">
                    <input id="priceDisplay"
                           type="text"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
                           required>
                </div>

                <div>
                    <label for="stock" class="mb-1 block text-sm font-medium text-slate-700">Stok</label>
                    <input id="stock"
                           type="number"
                           min="0"
                           th:field="*{stock}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
                           required>
                </div>
            </div>

            <div>
                <label for="description" class="mb-1 block text-sm font-medium text-slate-700">Deskripsi</label>
                <textarea id="description"
                          th:field="*{description}"
                          rows="4"
                          class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200"></textarea>
            </div>

            <div class="grid gap-5 sm:grid-cols-2">
                <label class="flex items-center gap-2 rounded-lg border border-slate-200 px-3 py-2">
                    <input type="checkbox" th:field="*{active}" class="h-4 w-4 rounded border-slate-300 text-slate-900">
                    <span class="text-sm font-medium text-slate-700">Produk Aktif</span>
                </label>

                <div>
                    <label for="createdAt" class="mb-1 block text-sm font-medium text-slate-700">Tanggal Dibuat</label>
                    <input id="createdAt"
                           type="date"
                           th:field="*{createdAt}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
                </div>
            </div>

            <div class="flex flex-col gap-2 pt-2 sm:flex-row">
                <button type="submit"
                        class="rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">
                    Simpan
                </button>
                <a th:href="@{/products}"
                   class="rounded-lg border border-slate-300 px-5 py-2.5 text-center text-sm font-semibold text-slate-700 hover:bg-slate-50">
                    Batal
                </a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('price');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatNumber(value) {
        return Number(value).toLocaleString('id-ID');
    }

    if (priceHidden && priceDisplay) {
        if (priceHidden.value && priceHidden.value !== '0') {
            priceDisplay.value = formatNumber(priceHidden.value);
        }

        priceDisplay.addEventListener('input', function () {
            const raw = this.value.replace(/\D/g, '');
            priceHidden.value = raw;
            this.value = raw ? formatNumber(raw) : '';
        });
    }
</script>

</body>
</html>

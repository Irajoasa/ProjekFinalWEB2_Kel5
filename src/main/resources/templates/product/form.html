<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}"></head>

<body class="bg-slate-50 text-slate-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="max-w-3xl mx-auto px-6 py-12">

    <div class="bg-white shadow rounded-2xl p-8 border">

        <h2 class="text-2xl font-bold mb-6"
            th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
            Form Produk
        </h2>

        <form th:action="@{/products/save}" th:object="${product}" method="post" class="space-y-5">

            <input type="hidden" th:field="*{id}">

            <!-- Nama -->
            <div>
                <label class="block text-sm font-semibold mb-1">Nama Produk</label>
                <input type="text" th:field="*{name}"
                       class="w-full border rounded-lg px-4 py-2 focus:ring focus:ring-indigo-200">
            </div>

            <!-- Kategori -->
            <div>
                <label class="block text-sm font-semibold mb-1">Kategori</label>
                <select th:field="*{category}"
                        class="w-full border rounded-lg px-4 py-2">
                    <option value="">-- Pilih Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat.displayName}">
                    </option>
                </select>
            </div>

            <!-- Harga -->
            <div>
                <label class="block text-sm font-semibold mb-1">Harga</label>

                <input type="hidden" id="price" th:field="*{price}">
                <input type="text" id="priceDisplay"
                       class="w-full border rounded-lg px-4 py-2">
            </div>

            <!-- Stok -->
            <div>
                <label class="block text-sm font-semibold mb-1">Stok</label>
                <input type="number" th:field="*{stock}"
                       class="w-full border rounded-lg px-4 py-2">
            </div>

            <!-- Deskripsi -->
            <div>
                <label class="block text-sm font-semibold mb-1">Deskripsi</label>
                <textarea th:field="*{description}"
                          class="w-full border rounded-lg px-4 py-2"></textarea>
            </div>

            <!-- Aktif -->
            <div class="flex items-center gap-2">
                <input type="checkbox" th:field="*{active}" class="w-4 h-4">
                <label>Produk Aktif</label>
            </div>

            <!-- Tanggal -->
            <div>
                <label class="block text-sm font-semibold mb-1">Tanggal Dibuat</label>
                <input type="date" th:field="*{createdAt}"
                       class="w-full border rounded-lg px-4 py-2">
            </div>

            <!-- Button -->
            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700">
                    Simpan
                </button>

                <a th:href="@{/products}"
                   class="border px-6 py-2 rounded-lg hover:bg-slate-100">
                    Batal
                </a>
            </div>

        </form>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

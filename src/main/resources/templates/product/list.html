<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Daftar Produk</h2>
            <a th:href="@{/products/new}" class="btn btn-success">
                + Tambah Produk Baru
            </a>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/products}" method="get" class="row g-3 align-items-end mb-4">
            <div class="col-md-5">
                <label for="keyword" class="form-label">Cari Nama Produk</label>
                <input
                    type="text"
                    id="keyword"
                    name="keyword"
                    class="form-control"
                    placeholder="Masukkan nama produk"
                    th:value="${keyword}">
            </div>
            <div class="col-md-4">
                <label for="category" class="form-label">Filter Kategori</label>
                <select id="category" name="category" class="form-select">
                    <option value="">Semua kategori</option>
                    <option th:each="category, iterStat : ${categories}"
                            th:value="${iterStat.index}"
                            th:selected="${selectedCategory != null and selectedCategory == iterStat.index}"
                            th:text="${category.displayName}">
                        Kategori
                    </option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">Cari</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Reset</a>
            </div>
        </form>

        <!-- Product Count -->
        <p class="text-muted">
            Menampilkan <strong th:text="${startItem}">0</strong>-<strong th:text="${endItem}">0</strong>
            dari <strong th:text="${totalItems}">0</strong> produk
        </p>

        <!-- Product Table -->
        <div th:if="${!#lists.isEmpty(products)}">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product, iterStat : ${products}">
                        <td th:text="${productPage.number * productPage.size + iterStat.index + 1}">1</td>
                        <td th:text="${product.name}">Nama Produk</td>
                        <td th:text="${product.category?.displayName}">Kategori</td>
                        <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                        <td th:text="${product.stock}">0</td>
                        <td>
                            <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                            <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                        </td>
                        <td>
                            <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Detail</a>
                            <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                                <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
            <p class="text-muted fs-5">Tidak ada produk.</p>
            <a th:if="${hasFilter}" th:href="@{/products}" class="btn btn-outline-secondary">Reset Pencarian</a>
            <a th:unless="${hasFilter}" th:href="@{/products/new}" class="btn btn-primary">Tambah Produk Pertama</a>
        </div>

        <nav th:if="${productPage.totalPages > 1}" aria-label="Navigasi halaman produk" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${!productPage.hasPrevious()} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${selectedCategory})}">
                        Previous
                    </a>
                </li>
                <li th:each="pageNumber : ${pageNumbers}"
                    class="page-item"
                    th:classappend="${pageNumber == currentPage} ? ' active'">
                    <a class="page-link"
                       th:href="@{/products(page=${pageNumber}, keyword=${keyword}, category=${selectedCategory})}"
                       th:text="${pageNumber + 1}">
                        1
                    </a>
                </li>
                <li class="page-item" th:classappend="${!productPage.hasNext()} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${selectedCategory})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

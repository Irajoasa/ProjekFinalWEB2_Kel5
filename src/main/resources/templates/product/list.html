<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}"></head>

<body class="bg-slate-50">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="max-w-7xl mx-auto px-6 py-12">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold">Daftar Produk</h2>

        <a th:href="@{/products/new}"
           class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">
            + Tambah Produk
        </a>
    </div>

    <!-- Search -->
    <form th:action="@{/products}" method="get"
          class="grid md:grid-cols-3 gap-4 mb-6">

        <input type="text" name="keyword"
               placeholder="Cari produk..."
               th:value="${keyword}"
               class="border rounded-lg px-4 py-2">

        <select name="category"
                class="border rounded-lg px-4 py-2">

            <option value="">Semua Kategori</option>

            <option th:each="category,iterStat:${categories}"
                    th:value="${iterStat.index}"
                    th:text="${category.displayName}">
            </option>

        </select>

        <button class="bg-indigo-600 text-white rounded-lg px-4 py-2">
            Cari
        </button>
    </form>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">

        <table class="min-w-full">

            <thead class="bg-slate-800 text-white">
            <tr>
                <th class="p-3">Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="product : ${products}"
                class="border-t hover:bg-slate-50">

                <td class="p-3 font-semibold"
                    th:text="${product.name}"></td>

                <td th:text="${product.category?.displayName}"></td>

                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price,0,'POINT',0,'COMMA')}"></td>

                <td th:text="${product.stock}"></td>

                <td>
                    <span th:if="${product.active}"
                          class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                        Aktif
                    </span>

                    <span th:unless="${product.active}"
                          class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm">
                        Tidak Aktif
                    </span>
                </td>

                <td class="space-x-2">
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="text-blue-600 font-semibold">Detail</a>

                    <a th:href="@{/products/{id}/edit(id=${product.id})}"
                       class="text-yellow-600 font-semibold">Edit</a>
                </td>

            </tr>

            </tbody>
        </table>

    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tambah/Edit Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow">
    <h2 class="text-xl font-bold mb-4">Form Produk</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="POST">
        <input type="hidden" th:field="*{id}">

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Nama Produk</label>
            <input type="text" th:field="*{name}" class="w-full border p-2 rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Harga</label>
            <input type="number" th:field="*{price}" class="w-full border p-2 rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Stok</label>
            <input type="number" th:field="*{stock}" class="w-full border p-2 rounded" required>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold mb-2">Kategori</label>
            <select th:field="*{category}" class="w-full border p-2 rounded">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.displayName}"></option>
            </select>
        </div>

        <div class="flex gap-2">
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Simpan Produk</button>
            <a th:href="@{/products}" class="bg-gray-500 text-white px-4 py-2 rounded">Batal</a>
        </div>
    </form>
</div>
</body>
</html>

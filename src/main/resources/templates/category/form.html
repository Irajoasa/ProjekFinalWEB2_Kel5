<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}"></head>

<body class="bg-slate-50 text-slate-900">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="max-w-xl mx-auto px-6 py-12">
    <div class="bg-white shadow rounded-2xl p-8 border">
        <h2 class="text-2xl font-bold mb-6"
            th:text="${category.id != null} ? 'Edit Kategori' : 'Tambah Kategori'">
            Form Kategori
        </h2>

        <div th:if="${errorMessage}"
             class="mb-5 rounded-lg bg-red-100 px-4 py-3 text-red-700"
             th:text="${errorMessage}">
            Error
        </div>

        <form th:action="@{/categories/save}" th:object="${category}" method="post" class="space-y-5">
            <input type="hidden" th:field="*{id}">

            <div>
                <label class="block text-sm font-semibold mb-1">Nama Kategori</label>
                <input type="text" th:field="*{name}"
                       class="w-full border rounded-lg px-4 py-2 focus:ring focus:ring-indigo-200"
                       required>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Deskripsi</label>
                <textarea th:field="*{description}"
                          class="w-full border rounded-lg px-4 py-2 focus:ring focus:ring-indigo-200"
                          rows="4"
                          placeholder="Opsional"></textarea>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700">
                    Simpan
                </button>

                <a th:href="@{/categories}"
                   class="border px-6 py-2 rounded-lg hover:bg-slate-100">
                    Batal
                </a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>

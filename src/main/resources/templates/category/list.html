<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Daftar Produk</h1>
        <a th:href="@{/products/new}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
            + Tambah Produk
        </a>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full border-collapse border border-gray-200">
            <thead>
            <tr class="bg-gray-100">
                <th class="border border-gray-200 px-4 py-2 text-left">ID</th>
                <th class="border border-gray-200 px-4 py-2 text-left">Nama Produk</th>
                <th class="border border-gray-200 px-4 py-2 text-left">Kategori</th>
                <th class="border border-gray-200 px-4 py-2 text-left">Stok</th>
                <th class="border border-gray-200 px-4 py-2 text-center">Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}" class="hover:bg-gray-50">
                <td class="border border-gray-200 px-4 py-2" th:text="${p.id}"></td>
                <td class="border border-gray-200 px-4 py-2 font-medium" th:text="${p.name}"></td>
                <td class="border border-gray-200 px-4 py-2" th:text="${p.category != null ? p.category.displayName : '-'}"></td>
                <td class="border border-gray-200 px-4 py-2" th:text="${p.stock}"></td>
                <td class="border border-gray-200 px-4 py-2 text-center">
                    <a th:href="@{/products/{id}/edit(id=${p.id})}" class="text-blue-600 hover:underline">Edit</a>

                    <form th:action="@{/products/{id}/delete(id=${p.id})}" method="POST" class="inline ml-3">
                        <button type="submit" class="text-red-600 hover:underline" onclick="return confirm('Yakin hapus?')">
                            Hapus
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="5" class="text-center py-4 text-gray-500 italic">Belum ada produk.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6">
        <a th:href="@{/}" class="text-gray-600 hover:text-gray-800 underline text-sm"> Kembali ke Dashboard</a>
    </div>
</div>

</body>
</html>
